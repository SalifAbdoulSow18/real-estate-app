# k8s/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: real-estate-app
  namespace: real-estate-app
  labels:
    app: real-estate-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: real-estate-app
  template:
    metadata:
      labels:
        app: real-estate-app
    spec:
      containers:
      - name: real-estate-app
        image: sasow/real-estate-app:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"